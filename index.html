
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Nicolau Maquiavel - O Príncipe | Oferta Especial R$ 9,00</title>
    <meta name="description" content="Adquira O Príncipe de Nicolau Maquiavel por apenas R$ 9,00. Edição especial digital com análises exclusivas e guia de aplicação prática.">

    <!-- Preconnect para performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Reset e Base */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
            --blood-red: #8B0000;
            --deep-red: #5C0000;
            --black: #0a0a0a;
            --dark-gray: #1a1a1a;
            --light-gray: #f5f5f5;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--black);
            color: #fff;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Scroll Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--blood-red));
            z-index: 10000;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Floating CTA */
        .floating-cta {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, var(--blood-red), var(--deep-red));
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(139, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.5s ease;
            border: 2px solid var(--gold);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
        }

        .floating-cta.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .floating-cta:hover {
            transform: translateX(-50%) translateY(-3px);
            box-shadow: 0 15px 50px rgba(139, 0, 0, 0.7);
        }

        .price-tag {
            background: var(--gold);
            color: var(--black);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 800;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(10,10,10,0.95), rgba(92,0,0,0.9));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
            top: -50%;
            left: -50%;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .hero-content {
            text-align: center;
            z-index: 2;
            max-width: 900px;
            padding: 20px;
            animation: fadeInUp 1s ease-out;
            position: relative;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: var(--black);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px var(--gold); }
            to { box-shadow: 0 0 20px var(--gold), 0 0 30px var(--gold); }
        }

        h1 {
            font-family: 'Cinzel', Georgia, serif;
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, var(--gold) 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: #ccc;
            margin-bottom: 40px;
            font-weight: 300;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .book-showcase {
            position: relative;
            margin: 40px 0;
            perspective: 1000px;
        }

        .book-3d {
            width: 260px;
            height: 380px;
            margin: 0 auto;
            background: linear-gradient(135deg, #2c1810, #1a0f0a);
            border-radius: 10px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.8),
                0 0 0 2px var(--gold),
                inset 0 0 50px rgba(212,175,55,0.1);
            position: relative;
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            50% { transform: translateY(-20px) rotateY(5deg); }
        }

        .book-title {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 1.6rem;
            color: var(--gold);
            border-bottom: 2px solid var(--blood-red);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .book-author {
            font-size: 1rem;
            color: #888;
            margin-top: auto;
        }

        .price-container {
            background: rgba(139, 0, 0, 0.3);
            border: 2px solid var(--blood-red);
            border-radius: 20px;
            padding: 30px;
            margin: 40px auto;
            backdrop-filter: blur(10px);
            max-width: 400px;
        }

        .old-price {
            font-size: 1.5rem;
            text-decoration: line-through;
            color: #666;
            margin-bottom: 10px;
        }

        .current-price {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212,175,55,0.5);
            line-height: 1;
        }

        .current-price span {
            font-size: 1.5rem;
            vertical-align: top;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #00C851, #007E33);
            color: #fff;
            text-decoration: none;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,200,81,0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,200,81,0.6);
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        .urgency {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: #00C851;
            border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* Countdown Timer */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(0,0,0,0.5);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid var(--gold);
            min-width: 70px;
        }

        .countdown-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            display: block;
            line-height: 1;
        }

        .countdown-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            margin-top: 5px;
            display: block;
        }

        /* Benefits Section */
        .benefits {
            padding: 100px 20px;
            background: var(--dark-gray);
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-title {
            font-family: 'Cinzel', Georgia, serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            text-align: center;
            margin-bottom: 60px;
            color: var(--gold);
        }

        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .benefit-card {
            background: linear-gradient(135deg, rgba(26,26,26,0.9), rgba(10,10,10,0.9));
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 15px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .benefit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--blood-red));
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .benefit-card:hover::before {
            transform: scaleX(1);
        }

        .benefit-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .benefit-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
        }

        .benefit-card h3 {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .benefit-card p {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* About Section */
        .about {
            padding: 100px 20px;
            background: var(--black);
            position: relative;
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .about-content {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }

        .about-text h2 {
            font-family: 'Cinzel', Georgia, serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            color: var(--gold);
            margin-bottom: 30px;
        }

        .about-text p {
            color: #ccc;
            margin-bottom: 20px;
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .quote {
            border-left: 4px solid var(--blood-red);
            padding-left: 30px;
            margin: 30px 0;
            font-style: italic;
            color: var(--gold);
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .portrait-frame {
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1;
            margin: 0 auto;
            border: 3px solid var(--gold);
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, #2c1810, #1a0f0a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', Georgia, serif;
            font-size: 6rem;
            color: var(--gold);
            box-shadow: 0 0 50px rgba(212,175,55,0.2);
        }

        /* Testimonials */
        .testimonials {
            padding: 100px 20px;
            background: linear-gradient(135deg, var(--dark-gray), var(--black));
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 60px;
        }

        .testimonial-card {
            background: rgba(26,26,26,0.8);
            border-radius: 15px;
            padding: 40px 30px;
            position: relative;
            border: 1px solid rgba(212,175,55,0.1);
            transition: transform 0.3s ease;
        }

        .testimonial-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212,175,55,0.3);
        }

        .testimonial-card::before {
            content: '"';
            font-family: 'Cinzel', Georgia, serif;
            font-size: 5rem;
            color: var(--blood-red);
            opacity: 0.3;
            position: absolute;
            top: -10px;
            left: 20px;
            line-height: 1;
        }

        .stars {
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .testimonial-text {
            color: #ddd;
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.8;
            position: relative;
            z-index: 1;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .author-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blood-red), var(--deep-red));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .author-info h4 {
            color: var(--gold);
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .author-info span {
            color: #666;
            font-size: 0.85rem;
        }

        /* FAQ Section */
        .faq {
            padding: 100px 20px;
            background: var(--black);
        }

        .faq-list {
            max-width: 800px;
            margin: 0 auto;
        }

        .faq-item {
            background: rgba(26,26,26,0.8);
            border: 1px solid rgba(212,175,55,0.1);
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .faq-item:hover {
            border-color: rgba(212,175,55,0.3);
        }

        .faq-item.active {
            border-color: rgba(212,175,55,0.5);
        }

        .faq-question {
            padding: 25px 30px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: #fff;
            transition: all 0.3s ease;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-size: 1rem;
            font-family: inherit;
        }

        .faq-question:hover {
            color: var(--gold);
        }

        .faq-icon {
            font-size: 1.5rem;
            transition: transform 0.3s ease;
            flex-shrink: 0;
            margin-left: 15px;
        }

        .faq-item.active .faq-icon {
            transform: rotate(45deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease;
            padding: 0 30px;
        }

        .faq-item.active .faq-answer {
            max-height: 300px;
            padding-bottom: 25px;
        }

        .faq-answer p {
            color: #aaa;
            line-height: 1.8;
        }

        /* Final CTA */
        .final-cta {
            padding: 100px 20px;
            background: linear-gradient(135deg, var(--blood-red), var(--deep-red));
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .final-cta::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .final-cta-content {
            position: relative;
            z-index: 2;
            max-width: 700px;
            margin: 0 auto;
        }

        .final-cta h2 {
            font-family: 'Cinzel', Georgia, serif;
            font-size: clamp(1.8rem, 4vw, 3rem);
            margin-bottom: 20px;
            color: #fff;
        }

        .final-cta p {
            font-size: 1.1rem;
            margin-bottom: 40px;
            color: rgba(255,255,255,0.9);
            line-height: 1.6;
        }

        .guarantee {
            display: inline-flex;
            align-items: center;
            gap: 15px;
